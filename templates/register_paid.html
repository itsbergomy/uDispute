{% extends "base_header.html" %}
{% block title %}Create Your {{ plan_label }} Account{% endblock %}
{% block content %}
<main class="flex justify-center items-center min-h-[75vh] px-4 py-10">
  <div class="glass-card glass-card--heavy glass-p w-full max-w-md glass-animate-in">
    <!-- Plan Badge -->
    <div class="flex justify-center mb-4">
      <span class="glass-badge {{ 'glass-badge--info' if plan == 'pro' else 'glass-badge--success' }}" style="font-size:0.75rem;padding:0.35rem 1rem;">
        {{ plan_label }} Plan — {{ '$80' if plan == 'pro' else '$125' }}/mo ✓
      </span>
    </div>

    <h2 class="text-2xl font-bold text-center mb-2 glass-text-3d" style="color:var(--text-primary);">Create Your Account</h2>
    <p class="text-center text-sm mb-6" style="color:var(--text-tertiary);">Payment confirmed. Set up your credentials to get started.</p>

    <form action="{{ url_for('auth.signup_paid', plan=plan) }}" method="POST" class="space-y-4">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <div>
        <label for="first_name" class="glass-label block">First Name</label>
        <input id="first_name" name="first_name" type="text" required
               class="glass-input w-full" />
      </div>
      <div>
        <label for="last_name" class="glass-label block">Last Name</label>
        <input id="last_name" name="last_name" type="text" required
               class="glass-input w-full" />
      </div>
      <div>
        <label for="email" class="glass-label block">Email</label>
        <input id="email" name="email" type="email" required
               class="glass-input w-full" />
      </div>
      <div>
        <label for="username" class="glass-label block">Username</label>
        <input id="username" name="username" type="text" required
               class="glass-input w-full" />
      </div>
      <div>
        <label for="password" class="glass-label block">Password</label>
        <input id="password" name="password" type="password" required minlength="8"
               class="glass-input w-full" />
      </div>
      <button type="submit"
              class="w-full glass-btn glass-btn--primary glass-shimmer-edge" style="position:relative;overflow:hidden;">
        {{ 'Enter Pro Mode' if plan == 'pro' else 'Enter Business Mode' }}
      </button>
    </form>
  </div>
</main>
{% endblock %}
